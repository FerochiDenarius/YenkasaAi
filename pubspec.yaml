name: yenkasa_ai_flutter
description: "Production-grade Flutter frontend for YenkasaAI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cross_file: ^0.3.4+2
  flutter_tts: ^4.2.0
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  go_router: ^16.2.4
  flutter_markdown: ^0.7.7+1
  pdf: ^3.11.1
  share_plus: ^11.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/yenkasa_ai_logo.png
